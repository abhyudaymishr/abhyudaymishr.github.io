---
layout: default
---
<article class="page-block">
  <header class="page-header">
    <p class="eyebrow">Project</p>
    <h1>{{ page.title }}</h1>
    <p class="meta-line">
      {% if page.status %}{{ page.status }}{% endif %}
      {% if page.timeline %}<span class="meta-separator">/</span>{{ page.timeline }}{% endif %}
    </p>
  </header>
  {% if page.summary %}
    <p class="page-header__intro">{{ page.summary }}</p>
  {% endif %}
  <div class="tag-grid tag-grid--left">
    {% for topic in page.topics %}
      <span class="chip">{{ topic }}</span>
    {% endfor %}
  </div>
  <div class="prose">
    {{ content }}
  </div>
</article>
