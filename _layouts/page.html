---
layout: default
---
<article class="page-block">
  <header class="page-header">
    <p class="eyebrow">{{ page.kicker | default: "Research" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.intro %}
      <p class="page-header__intro">{{ page.intro }}</p>
    {% endif %}
  </header>
  <div class="prose">
    {{ content }}
  </div>
</article>
